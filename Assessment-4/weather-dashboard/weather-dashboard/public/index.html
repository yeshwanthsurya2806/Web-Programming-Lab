<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather Dashboard</title>
  <link rel="stylesheet" href="styles/main.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="app">
  <!-- Search Bar -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">⛅</span>
      <span class="logo-text">Nimbus</span>
    </div>
    <div class="search-wrapper">
      <input type="text" id="search-input" placeholder="Search city..." autocomplete="off" />
      <button id="locate-btn" title="Use my location">📍</button>
      <div id="autocomplete-list" class="autocomplete-list hidden"></div>
    </div>
    <div class="unit-toggle">
      <button class="unit-btn active" id="btn-c">°C</button>
      <button class="unit-btn" id="btn-f">°F</button>
    </div>
  </header>

  <!-- Demo Banner -->
  <div id="demo-banner" class="demo-banner hidden">
    🔧 Running in <strong>demo mode</strong> — add your free <a href="https://openweathermap.org/api" target="_blank">OpenWeather API key</a> to <code>.env</code> for live data.
  </div>

  <!-- Loading -->
  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p>Fetching weather…</p>
  </div>

  <!-- Error -->
  <div id="error-msg" class="error-msg hidden"></div>

  <!-- Main content -->
  <main id="main-content" class="main-content hidden">

    <!-- Hero card -->
    <section class="hero-card" id="hero-card">
      <div class="hero-left">
        <div class="city-name" id="city-name">—</div>
        <div class="city-country" id="city-country"></div>
        <div class="current-temp" id="current-temp">—</div>
        <div class="feels-like" id="feels-like"></div>
        <div class="condition-label" id="condition-label"></div>
      </div>
      <div class="hero-right">
        <div class="weather-icon-large" id="weather-icon-large"></div>
        <div class="temp-range" id="temp-range"></div>
        <div class="local-time" id="local-time"></div>
      </div>
    </section>

    <!-- Stats row -->
    <section class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">💧</div>
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="stat-humidity">—</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-humidity"></div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💨</div>
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="stat-wind">—</div>
        <div class="wind-direction" id="wind-dir"></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">👁️</div>
        <div class="stat-label">Visibility</div>
        <div class="stat-value" id="stat-visibility">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🌡️</div>
        <div class="stat-label">Pressure</div>
        <div class="stat-value" id="stat-pressure">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">☁️</div>
        <div class="stat-label">Cloud Cover</div>
        <div class="stat-value" id="stat-clouds">—</div>
        <div class="stat-bar"><div class="stat-bar-fill" id="bar-clouds"></div></div>
      </div>
      <div class="stat-card sun-card">
        <div class="stat-icon">🌅</div>
        <div class="stat-label">Sun</div>
        <div class="sun-times" id="sun-times"></div>
        <div class="sun-arc" id="sun-arc-container">
          <svg viewBox="0 0 200 110" class="sun-arc-svg">
            <path d="M 10 100 Q 100 10 190 100" stroke="var(--accent)" stroke-width="2" fill="none" stroke-dasharray="4 3" opacity="0.4"/>
            <circle id="sun-dot" cx="100" cy="55" r="6" fill="var(--accent)"/>
          </svg>
        </div>
      </div>
    </section>

    <!-- Hourly -->
    <section class="panel">
      <h2 class="panel-title">Hourly Forecast</h2>
      <div class="hourly-scroll" id="hourly-scroll"></div>
    </section>

    <!-- 5-Day forecast -->
    <section class="panel">
      <h2 class="panel-title">5-Day Forecast</h2>
      <div class="forecast-list" id="forecast-list"></div>
    </section>

  </main>

  <!-- Welcome screen -->
  <div id="welcome" class="welcome">
    <div class="welcome-icon">🌍</div>
    <h1 class="welcome-title">Nimbus Weather</h1>
    <p class="welcome-sub">Search a city or use your location to get started.</p>
    <button class="welcome-btn" id="welcome-locate">Use My Location</button>
  </div>
</div>

<script src="scripts/utils.js"></script>
<script src="scripts/ui.js"></script>
<script src="scripts/app.js"></script>
</body>
</html>
