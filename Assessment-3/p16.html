<!DOCTYPE html>
<html>
<head>
<title>Overlapping Image Gallery</title>

<style>

body{
font-family:Arial;
text-align:center;
}

.gallery{
position:relative;
width:400px;
height:250px;
margin:auto;
}

.gallery img{
width:200px;
height:130px;
position:absolute;
cursor:pointer;
border:2px solid black;
}

#img1{
left:0px;
top:0px;
z-index:1;
}

#img2{
left:80px;
top:40px;
z-index:2;
}

#img3{
left:160px;
top:80px;
z-index:3;
}

</style>

</head>

<body>

<pre>
&lt;!-- Name: G Yeshwanth Surya --&gt;
&lt;!-- Registration Number: 24BCT0041 --&gt;
</pre>

<h2>Overlapping Image Gallery</h2>

<div class="gallery">

<img src="i1.jpg" id="img1" onclick="bringFront(this)">
<img src="i2.jpg" id="img2" onclick="bringFront(this)">
<img src="i3.jpg" id="img3" onclick="bringFront(this)">

</div>

<script>

var topIndex = 3;

function bringFront(image)
{

image.style.zIndex = ++topIndex;

}

</script>

</body>
</html>
