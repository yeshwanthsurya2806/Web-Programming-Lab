<pre>

<h2>Print Numbers from 1 to N</h2>

Enter N:
<input type="text" id="number">

<button onclick="printNumbers()">Print</button>

<p id="result"></p>

<script>

function printNumbers()
{

var n = document.getElementById("number").value;

var i = 1;
var output = "";

while(i <= n)
{
output = output + i + " ";
i++;
}

document.getElementById("result").innerHTML =
"Numbers: " + output;

}

</script>

</body>
</html>
