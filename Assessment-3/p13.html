<h2>Product Order Form</h2>

<form id="orderForm">

<fieldset>
<legend>Electronics</legend>

<input type="checkbox" name="item" value="500"> Headphones - ₹500<br>
<input type="checkbox" name="item" value="1500"> Keyboard - ₹1500<br>

</fieldset>

<fieldset>
<legend>Accessories</legend>

<input type="checkbox" name="item" value="300"> Mouse Pad - ₹300<br>
<input type="checkbox" name="item" value="700"> USB Drive - ₹700<br>

</fieldset>

<button type="button" onclick="calculateTotal()">Calculate Total</button>

</form>

<p id="result"></p>

<script>

function calculateTotal()
{

var items = document.querySelectorAll('input[name="item"]:checked');

var total = 0;

for (var item of items)
{

total = total + parseFloat(item.value);

}

document.getElementById("result").innerHTML =
"Total Price: ₹ " + total;

}

</script>

</body>
