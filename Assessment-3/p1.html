<h2>Click the Button to Display Message</h2>

<button onclick="showMessage()">Click Me</button>

<p id="demo"></p>

<script>
var message = "Hello, world!";

function showMessage(){
document.getElementById("demo").outerHTML = "<p>" + message + "</p>";
}
</script>
