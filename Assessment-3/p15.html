<h2>Dynamic Font Customization Tool</h2>

<fieldset>

<legend>Font Controls</legend>

Font Size:
<input type="range" min="10" max="60" value="20" id="sizeSlider" oninput="changeFontSize()">
<br><br>

Text Color:
<input type="color" id="textColor" onchange="changeTextColor()">
<br><br>

Background Color:
<input type="color" id="bgColor" onchange="changeBackgroundColor()">

</fieldset>

<div id="textBox">
This is a sample text for font customization.
</div>

<script>

function changeFontSize()
{
var size = document.getElementById("sizeSlider").value;
document.getElementById("textBox").style.fontSize = size + "px";
}

function changeTextColor()
{
var color = document.getElementById("textColor").value;
document.getElementById("textBox").style.color = color;
}

function changeBackgroundColor()
{
var bg = document.getElementById("bgColor").value;
document.getElementById("textBox").style.backgroundColor = bg;
}

</script>

</body>
</html>
