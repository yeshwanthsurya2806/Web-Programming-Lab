<h2>Area of Rectangle Calculation</h2>

<p id="result"></p>

<script>

// Integer values
var lengthValue = 10;
var widthValue = 5;

var areaInteger = lengthValue * widthValue;

// Floating point values
lengthValue = 10.5;
widthValue = 5.2;

var areaFloat = lengthValue * widthValue;

document.getElementById("result").innerHTML =
"Area with Integer Values: " + areaInteger +
"<br>Area with Floating Point Values: " + areaFloat;

</script>
